<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעבד הזמנה</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(135deg, #0a2351 0%, #1e3a6f 50%, #2d4a7c 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: white;
  padding: 60px 50px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  max-width: 550px;
  width: 100%;
  text-align: center;
  border-top: 6px solid #00bcd4;
}

h1 {
  color: #0a2351;
  font-size: 30px;
  margin-bottom: 20px;
  font-weight: 700;
}

p {
  color: #555;
  font-size: 18px;
  line-height: 1.7;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 5px solid #eee;
  border-top: 5px solid #00bcd4;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 40px auto;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.error {
  background: #ffebee;
  color: #c62828;
  padding: 20px;
  border-radius: 12px;
  margin-top: 30px;
  display: none;
}

</style>
</head>

<body>
<div class="container">
  <h1>מעבד את ההזמנה שלך</h1>
  <p id="status">אנא המתן, אנו יוצרים את המשלוח ומסיימים את ההזמנה…</p>

  <div class="spinner"></div>

  <div class="error" id="error"></div>
</div>

<script>
async function createOrder() {
  try {

    const params = new URLSearchParams(window.location.search);
    const submissionId = params.get("submission_id");

    if (!submissionId) {
      throw new Error("Missing submission_id");
    }

    const res = await fetch("https://yedauto.com/webhook/create-order-after-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        submission_id: submissionId
      })
    });

    if (!res.ok) {
      throw new Error("Server error while creating order");
    }

    // якщо все добре → переходимо на thank you
    window.location.href =
      `https://yedatechdesign.github.io/OS-processing-page/thank-you.html?submission_id=${submissionId}`;

  } catch (err) {
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent =
      "אירעה שגיאה ביצירת ההזמנה. אנא פנו לתמיכה.";
    document.getElementById("status").textContent = "אירעה שגיאה";
  }
}

window.addEventListener("load", createOrder);
</script>

</body>
</html>
