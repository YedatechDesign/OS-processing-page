<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בקשתך התקבלה</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2351 0%, #1e3a6f 50%, #2d4a7c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,255,255,0.05) 0%, transparent 70%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .container {
            background: white;
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border-top: 6px solid #00bcd4;
            position: relative;
            z-index: 1;
        }

        .success-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(0,230,118,0.4);
            border: 5px solid #e8f5e9;
        }

        .checkmark {
            width: 60px;
            height: 60px;
            stroke: white;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            color: #0a2351;
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            color: #555;
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .info-box {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-right: 5px solid #00bcd4;
            padding: 25px;
            border-radius: 12px;
            margin-top: 35px;
            text-align: right;
        }

        .info-box strong {
            color: #00bcd4;
            font-size: 18px;
            display: block;
            margin-bottom: 10px;
        }

        .info-box p {
            margin: 0;
            line-height: 1.7;
            color: #0a2351;
        }

        .footer-name {
            margin-top: 20px;
            font-weight: bold;
            color: #0a2351;
        }

        @media (max-width: 480px) {
            .container { padding: 40px 25px; }
            h1 { font-size: 24px; }
            p { font-size: 16px; }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="success-icon">
        <svg class="checkmark" viewBox="0 0 52 52">
            <path d="M14 27l7 7 16-16"/>
        </svg>
    </div>

    <h1>בקשתך התקבלה! 🎉</h1>

    <p>
        עותק של בקשתך נשלח אליך למייל עם כל הפרטים והנחיות נוספות.
    </p>

    <div class="info-box">
        <strong>📞 לכל שאלה ניתן ליצור איתנו קשר</strong>
        <p>
            בטלפון 03-9444567<br>
            או במייל ts@osfinance.co.il
        </p>
    </div>

    <div class="footer-name">
        מכללת אורין שפלטר
    </div>
</div>

<script>
    async function triggerPickupDetails() {
        try {
            const params = new URLSearchParams(window.location.search);

            const submissionId = params.get("submission_id");
            const pickupCode = params.get("pickup_point_code");
            const pickupCity = params.get("pickup_city");

            if (!submissionId || !pickupCode || !pickupCity) {
                console.error("Missing required parameters");
                return;
            }

            // Prevent double trigger on refresh
            if (sessionStorage.getItem("pickup_triggered")) return;
            sessionStorage.setItem("pickup_triggered", "true");

            await fetch("https://yedauto.com/webhook/pickup-point-details", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    submission_id: submissionId,
                    pickup_point_code: pickupCode,
                    pickup_city: pickupCity
                })
            });

            console.log("Pickup details flow triggered");

        } catch (error) {
            console.error("Pickup details trigger failed:", error);
        }
    }

    window.addEventListener("load", triggerPickupDetails);
</script>

</body>
</html>
