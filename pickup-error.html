<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שגיאה בבחירת נקודת איסוף</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(135deg, #0a2351 0%, #1e3a6f 50%, #2d4a7c 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: white;
  padding: 60px 50px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  max-width: 550px;
  width: 100%;
  text-align: center;
  border-top: 6px solid #f44336;
}

h1 {
  color: #0a2351;
  font-size: 28px;
  margin-bottom: 20px;
}

p {
  color: #555;
  font-size: 18px;
  margin-bottom: 30px;
}

.button {
  display: inline-block;
  background: #00bcd4;
  color: white;
  padding: 15px 30px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
}

.button:hover {
  background: #0097a7;
}

</style>
</head>

<body>
<div class="container">
  <h1>שגיאה בבחירת נקודת האיסוף</h1>
  <p>
    נקודת האיסוף אינה תואמת לעיר שנבחרה או שאינה קיימת.<br>
    אנא מלאו את הטופס מחדש ובחרו נקודה תקינה.
  </p>

  <a href="https://tally.so/r/zx764k" class="button">
    חזרה לטופס
  </a>
</div>
</body>
</html>
